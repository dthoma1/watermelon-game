<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Watermelon">
  <title>🍉 Watermelon Merge</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="score-display">✨ 0</div>
  <div id="next-fruit"></div>
  <div id="game-over-screen" class="hidden">
    <div class="game-over-content">
      <div class="game-over-emoji">🥺💔</div>
      <h1>Oh no!!</h1>
      <p class="game-over-subtitle">the fruits got too tall~</p>
      <p id="final-score">✨ 0 points ✨</p>
      <button id="restart-btn">Try Again!! 🍉💕</button>
      <p class="encouragement">you got this bestie!</p>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
